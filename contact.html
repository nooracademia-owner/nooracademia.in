<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | Noor Academia IN</title>
    <link rel="stylesheet" href="css/style.css">

    <!-- FAVICON -->
    <link rel="apple-touch-icon" sizes="180x180" href="assets/logo/favicon/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="assets/logo/favicon/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="assets/logo/favicon/favicon-16x16.png">
    <link rel="manifest" href="assets/logo/favicon/site.webmanifest">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-CNZ4BWEWSL"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());

      gtag('config', 'G-CNZ4BWEWSL');
    </script>

    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script type="text/javascript">
        (function() {
            // Initialize EmailJS with your public key
            emailjs.init("jI41UGkceIBubOIV0");
        })();
    </script>
</head>
<body>
    <header>
        <div class="container">
            <a href="index.html" style="text-decoration: none; color: inherit;">
                <h1 class="logo">
                    <img src="assets/logo/logo.png" alt="Noor Academia Logo" class="header-logo">
                    <span class="logo-text-wrapper">
                        <span class="logo-main">NOOR</span>
                        <span class="logo-sub">Academia<sup>IN</sup></span>
                        <span class="header-tagline">Learn . Grow . Shine</span>
                    </span>
                </h1>
            </a>
            <nav>
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="index.html#features">Why Us</a></li>
                    <li><a href="index.html#courses">Subjects</a></li>
                    <li><a href="index.html#videos">Lectures</a></li>
                    <li><a href="index.html#about">Mission</a></li>
                    <li><a href="contact.html">Contact</a></li>
                </ul>
            </nav>
            <button id="menu-btn" class="menu-btn" aria-label="Open Menu" aria-expanded="false">
                <span class="menu-icon-line"></span>
                <span class="menu-icon-line"></span>
                <span class="menu-icon-line"></span>
            </button>
        </div>
    </header>

    <main>
        <section class="contact-section">
            <div class="container">
                <h2>Get In Touch</h2>
                <p>Have a question, a suggestion, or a topic request? We'd love to hear from you.</p>
                <div class="contact-form-container">
                    <form id="contact-form">
                        <div class="form-group">
                            <label for="name">Name</label>
                            <input type="text" id="name" name="name" required placeholder="Your Name">
                        </div>
                        <div class="form-group">
                            <label for="email">Email</label>
                            <input type="email" id="email" name="email" required placeholder="Your email address">
                        </div>
                        <div class="form-group">
                            <label for="subject">Subject</label>
                            <input type="text" id="subject" name="subject" placeholder="Add a subject">
                        </div>
                        <div class="form-group">
                            <label for="message">Message</label>
                            <textarea id="message" name="message" required placeholder="Type your message here..."></textarea>
                        </div>
                        <button type="submit" class="btn-submit">Send Message</button>
                    </form>
                    <div id="form-status" style="display: none;"></div>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <p>© 2024 Noor Academia<sup>IN</sup> | Learn. Grow. Achieve.</p>
    </footer>

    <script src="js/script.js"></script>
    <script>
        document.getElementById('contact-form').addEventListener('submit', function(event) {
            event.preventDefault();

            const btn = this.querySelector('button[type="submit"]');
            const originalContent = btn.innerHTML;
            const formStatus = document.getElementById('form-status');

            btn.innerHTML = 'Sending...';
            btn.disabled = true;
            formStatus.style.display = 'none';

            emailjs.sendForm('service_qrcsv01', 'template_0vjd7fb', this)
                .then(function() {
                    formStatus.textContent = 'Message sent successfully! We will get back to you shortly.';
                    formStatus.className = 'status-success';
                    formStatus.style.display = 'block';
                    document.getElementById('contact-form').reset();
                }, function(error) {
                    console.log('FAILED...', error);
                    formStatus.textContent = 'Failed to send message. Please try again later or contact us directly.';
                    formStatus.className = 'status-error';
                    formStatus.style.display = 'block';
                })
                .finally(function() {
                    // This block runs whether the email succeeds or fails
                    btn.innerHTML = originalContent;
                    btn.disabled = false;
                });
        });
    </script>
</body>
</html>
