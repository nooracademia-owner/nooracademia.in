    <link rel="icon" type="image/png" sizes="32x32" href="assets/logo/favicon/favicon-32x32.png">

<body>
    <div id="header-placeholder"></div>

    <main>
        <section class="contact-section">
            <div class="container">
                <h2>Get In Touch</h2>
                <p>Have a question, a suggestion, or a topic request? We'd love to hear from you.</p>
                <div class="contact-form-container">
                    <form id="contact-form">
                        <div class="form-group">
                            <label for="name">Name</label>
                            <input type="text" id="name" name="name" required placeholder="Your Name">
                        </div>
                        <div class="form-group">
                            <label for="email">Email</label>
                            <input type="email" id="email" name="email" required placeholder="Your email address">
                        </div>
                        <div class="form-group">
                            <label for="subject">Subject</label>
                            <input type="text" id="subject" name="subject" placeholder="Add a subject">
                        </div>
                        <div class="form-group">
                            <label for="message">Message</label>
                            <textarea id="message" name="message" required placeholder="Type your message here..."></textarea>
                        </div>
                        <button type="submit" class="btn-submit">Send Message</button>
                    </form>
                    <div id="form-status" style="display: none;"></div>
                </div>
            </div>
        </section>
    </main>

    <div id="footer-placeholder"></div>
    <script src="js/script.js"></script>
    <script src="js/contact-form.js"></script>
</body>
</html>
